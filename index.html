<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hakuna Matata Resto — Menu</title>
  <meta name="description"
    content="Hakuna Matata Restaurant - No Worries, Just Good Food. Browse our premium menu featuring appetizers, salads, meals, sandwiches, pasta, and burgers.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════ */
    :root {
      --bg: #050302;
      --bg2: #0a0604;
      --bg3: #120b08;
      --bg4: #1a100b;
      --surface: rgba(20, 14, 10, 0.6);
      --surface2: rgba(30, 20, 15, 0.7);
      --gold: #c8900a;
      --gold-lt: #f0c040;
      --gold-dim: rgba(200, 144, 10, .15);
      --gold-glow: rgba(200, 144, 10, .08);
      --cream: #f0e6d0;
      --cream2: #c0a878;
      --cream3: #8a7050;
      --red: #6a1010;
      --red2: #3a0808;
      --border: rgba(200, 144, 10, .12);
      --border2: rgba(200, 144, 10, .28);
      --r: 16px;
      --r2: 24px;
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, .3);
      --shadow-md: 0 8px 32px rgba(0, 0, 0, .5);
      --shadow-lg: 0 20px 60px rgba(0, 0, 0, .7);
      --shadow-gold: 0 0 40px rgba(200, 144, 10, .15);
      --transition: .35s cubic-bezier(.4, 0, .2, 1);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Cairo', 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      letter-spacing: 0.3px;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gold);
      border-radius: 3px;
    }

    img {
      display: block;
      max-width: 100%;
    }

    /* ═══════════════════════════════════
   PARTICLES BG
═══════════════════════════════════ */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ═══════════════════════════════════
   NAVBAR
═══════════════════════════════════ */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 500;
      height: 70px;
      background: rgba(8, 6, 4, .85);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(20px, 4vw, 48px);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav.scrolled {
      background: rgba(5, 3, 2, .92);
      backdrop-filter: blur(32px) saturate(1.8);
      -webkit-backdrop-filter: blur(32px) saturate(1.8);
      box-shadow: 0 10px 40px rgba(0, 0, 0, .6);
      border-bottom: 1px solid var(--border2);
      height: 60px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-brand img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      object-fit: cover;
    }

    .nav-brand-text {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 900;
      color: var(--gold-lt);
      letter-spacing: 1px;
    }

    .nav-brand-text span {
      color: var(--gold);
    }

    .nav-back {
      display: none;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--gold-lt);
      cursor: pointer;
      padding: 8px 18px;
      border-radius: 30px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      transition: all var(--transition);
    }

    .nav-back:hover {
      background: var(--gold-dim);
    }

    .nav-back svg {
      width: 16px;
      height: 16px;
    }

    .nav-back.show {
      display: flex;
    }

    /* ═══════════════════════════════════
   HERO
═══════════════════════════════════ */
    .hero {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px clamp(20px, 5vw, 60px) 60px;
      position: relative;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 50% 40%, rgba(200, 144, 10, .06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 50% 90%, rgba(106, 16, 16, .15) 0%, transparent 60%);
    }

    .hero-logo {
      width: clamp(140px, 22vw, 220px);
      height: clamp(140px, 22vw, 220px);
      border-radius: 50%;
      border: 2px solid rgba(200, 144, 10, .4);
      padding: 8px;
      background: linear-gradient(135deg, rgba(200, 144, 10, .1), transparent);
      object-fit: cover;
      box-shadow: 0 0 60px rgba(200, 144, 10, .2), 0 0 120px rgba(200, 144, 10, .1), inset 0 0 30px rgba(200, 144, 10, .1);
      margin-bottom: clamp(24px, 4vw, 36px);
      animation: logoPulse 5s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    .hero-logo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    @keyframes logoPulse {

      0%,
      100% {
        transform: translateY(0);
        box-shadow: 0 0 60px rgba(200, 144, 10, .2), 0 0 120px rgba(200, 144, 10, .1), inset 0 0 30px rgba(200, 144, 10, .1);
      }

      50% {
        transform: translateY(-8px);
        box-shadow: 0 20px 80px rgba(200, 144, 10, .35), 0 0 160px rgba(200, 144, 10, .15), inset 0 0 40px rgba(200, 144, 10, .15);
      }
    }

    .hero-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: clamp(10px, 1.6vw, 13px);
      font-weight: 600;
      letter-spacing: clamp(6px, 2vw, 14px);
      color: var(--gold);
      opacity: .7;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 9vw, 100px);
      font-weight: 900;
      color: var(--gold-lt);
      line-height: 1;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    .hero-title em {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
      font-size: clamp(20px, 4.5vw, 52px);
      margin-top: 8px;
    }

    .hero-sub {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(14px, 2.2vw, 20px);
      font-weight: 300;
      color: var(--cream2);
      letter-spacing: 2px;
      margin: 18px 0 32px;
      position: relative;
      z-index: 1;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      width: min(300px, 80vw);
      margin: 0 auto;
    }

    .div-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .div-gem {
      width: 7px;
      height: 7px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 36px;
      padding: 16px 42px;
      background: linear-gradient(135deg, var(--gold), #d49c15, #f0be38);
      background-size: 200% auto;
      color: var(--bg);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 4px;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(200, 144, 10, .3);
      transition: all 0.5s;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .hero-cta::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: skewX(-20deg);
      transition: 0.5s;
    }

    .hero-cta:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 15px 40px rgba(200, 144, 10, .5);
      background-position: right center;
    }

    .hero-cta:hover::before {
      left: 150%;
    }

    .hero-scroll-hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--gold);
      opacity: .5;
      animation: bobDown 2.5s ease-in-out infinite;
      font-size: 24px;
    }

    @keyframes bobDown {

      0%,
      100% {
        transform: translateX(-50%) translateY(0)
      }

      55% {
        transform: translateX(-50%) translateY(10px)
      }
    }

    /* ═══════════════════════════════════
   CATEGORIES GRID
═══════════════════════════════════ */
    #categories {
      max-width: 1300px;
      margin: 0 auto;
      padding: clamp(40px, 6vw, 80px) clamp(16px, 4vw, 48px);
    }

    .cats-header {
      text-align: center;
      margin-bottom: clamp(32px, 5vw, 56px);
    }

    .cats-header .sec-tag {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 6px;
      margin-bottom: 10px;
      font-family: 'Cairo', sans-serif;
    }

    .cats-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 900;
      color: var(--gold-lt);
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .cats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
      gap: clamp(16px, 2.5vw, 24px);
    }

    .cat-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--r2);
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      aspect-ratio: 16/10;
      transition: all .5s cubic-bezier(.4, 0, .2, 1);
    }

    .cat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 20%, rgba(5, 3, 2, .95) 100%);
      z-index: 2;
      transition: all .5s;
    }

    .cat-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(200, 144, 10, .4);
      box-shadow: 0 30px 60px rgba(0, 0, 0, .8), 0 0 40px rgba(200, 144, 10, .2);
    }

    .cat-card:hover::before {
      background: linear-gradient(180deg, transparent 10%, rgba(5, 3, 2, .9) 100%);
    }

    .cat-card-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      z-index: 1;
    }

    .cat-card-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all .6s;
    }

    .cat-card-bg .placeholder-icon {
      width: 60px;
      height: 60px;
      color: rgba(200, 144, 10, .25);
      transition: all .5s;
    }

    .cat-card:hover .cat-card-bg img {
      transform: scale(1.1) rotate(-1deg);
    }

    .cat-card:hover .cat-card-bg .placeholder-icon {
      transform: scale(1.15);
      color: rgba(200, 144, 10, .5);
    }

    .cat-card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: clamp(20px, 3vw, 32px);
      z-index: 3;
    }

    .cat-card-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 900;
      color: var(--gold-lt);
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .cat-card-name-ar {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 800;
      color: var(--cream2);
      margin-bottom: 10px;
    }

    .cat-card-count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 1px;
      background: var(--gold-dim);
      border: 1px solid var(--border2);
      padding: 4px 14px;
      border-radius: 20px;
    }

    .cat-card-arrow {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      transition: all var(--transition);
    }

    .cat-card:hover .cat-card-arrow {
      background: var(--gold);
    }

    .cat-card-arrow svg {
      width: 18px;
      height: 18px;
      color: var(--gold-lt);
      transition: color var(--transition);
    }

    .cat-card:hover .cat-card-arrow svg {
      color: var(--bg);
    }

    /* ═══════════════════════════════════
   CATEGORY VIEW (Items)
═══════════════════════════════════ */
    #categoryView {
      display: none;
      max-width: 1300px;
      margin: 0 auto;
      padding: 90px clamp(16px, 4vw, 48px) clamp(40px, 6vw, 80px);
      min-height: 100vh;
      animation: fadeSlideUp .5s cubic-bezier(.4, 0, .2, 1);
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #categoryView.show {
      display: block;
    }

    .cv-header {
      text-align: center;
      margin-bottom: clamp(28px, 4vw, 48px);
      padding-top: 10px;
    }

    .cv-header .cv-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      color: var(--gold);
      opacity: 0.8;
    }

    .cv-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(34px, 7vw, 60px);
      font-weight: 900;
      color: var(--gold-lt);
      margin-bottom: 4px;
    }

    .cv-header .cv-ar {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 800;
      color: var(--cream2);
      margin-bottom: 16px;
    }

    /* ─── Item Cards ─── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 400px), 1fr));
      gap: clamp(14px, 2vw, 20px);
      margin-bottom: clamp(24px, 4vw, 40px);
    }

    .item-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--r);
      display: flex;
      overflow: hidden;
      transition: all .4s cubic-bezier(.4, 0, .2, 1);
      animation: itemIn .5s cubic-bezier(.4, 0, .2, 1) both;
    }

    .item-card:nth-child(1) {
      animation-delay: .05s;
    }

    .item-card:nth-child(2) {
      animation-delay: .10s;
    }

    .item-card:nth-child(3) {
      animation-delay: .15s;
    }

    .item-card:nth-child(4) {
      animation-delay: .20s;
    }

    .item-card:nth-child(5) {
      animation-delay: .25s;
    }

    .item-card:nth-child(6) {
      animation-delay: .30s;
    }

    .item-card:nth-child(7) {
      animation-delay: .35s;
    }

    .item-card:nth-child(8) {
      animation-delay: .40s;
    }

    @keyframes itemIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .item-card:hover {
      transform: translateY(-6px);
      border-color: rgba(200, 144, 10, .35);
      box-shadow: 0 15px 40px rgba(0, 0, 0, .6), 0 0 30px rgba(200, 144, 10, .1);
      background: rgba(30, 20, 15, .75);
    }

    .item-img {
      width: clamp(110px, 25%, 140px);
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      background: var(--bg3);
    }

    .item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s cubic-bezier(.4, 0, .2, 1);
    }

    .item-card:hover .item-img img {
      transform: scale(1.08);
    }

    .item-img-placeholder {
      width: 100%;
      height: 100%;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--bg3), var(--bg4));
      color: rgba(200, 144, 10, .2);
    }

    .item-img-placeholder svg {
      width: 32px;
      height: 32px;
    }

    .item-img-placeholder span {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .item-body {
      flex: 1;
      min-width: 0;
      padding: clamp(14px, 2.5vw, 20px);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item-names {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }

    .item-en {
      font-family: 'Playfair Display', serif;
      font-size: clamp(14px, 2.2vw, 17px);
      font-weight: 700;
      color: var(--gold-lt);
      line-height: 1.25;
      flex: 1;
      min-width: 0;
    }

    .item-ar {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(14px, 2vw, 16px);
      font-weight: 800;
      color: var(--cream);
      white-space: nowrap;
    }

    .item-desc {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(11.5px, 1.5vw, 13px);
      font-weight: 400;
      color: var(--cream3);
      line-height: 1.8;
      direction: rtl;
      text-align: right;
      flex: 1;
    }

    .item-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .item-price {
      font-family: 'Playfair Display', serif;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 700;
      color: var(--gold-lt);
      background: linear-gradient(135deg, rgba(200, 144, 10, .12), rgba(200, 144, 10, .04));
      border: 1px solid rgba(200, 144, 10, .22);
      padding: 4px 18px;
      border-radius: 30px;
    }

    .item-price::after {
      content: ' EGP';
      font-size: .55em;
      color: var(--gold);
      font-weight: 500;
      letter-spacing: 1px;
    }

    /* ─── Extras ─── */
    .extras-box {
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: itemIn .6s .4s both;
      box-shadow: var(--shadow-md);
    }

    .extras-top {
      background: linear-gradient(135deg, var(--red2), var(--red), var(--red2));
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .extras-top-line {
      flex: 1;
      height: 1px;
      background: rgba(200, 144, 10, .3);
    }

    .extras-top-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(15px, 2.4vw, 20px);
      font-weight: 700;
      color: var(--gold-lt);
      letter-spacing: 5px;
      white-space: nowrap;
    }

    .extras-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 180px), 1fr));
      gap: 1px;
      background: var(--border);
    }

    .extras-item {
      background: var(--surface);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      direction: rtl;
      transition: background var(--transition);
    }

    .extras-item:hover {
      background: var(--surface2);
    }

    .extras-item-name {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(12px, 1.8vw, 14px);
      font-weight: 700;
      color: var(--cream);
    }

    .extras-item-price {
      font-family: 'Playfair Display', serif;
      font-size: clamp(12px, 1.8vw, 14px);
      font-weight: 700;
      color: var(--gold-lt);
      background: rgba(200, 144, 10, .1);
      border: 1px solid rgba(200, 144, 10, .2);

    ═══════════════════════════════════ */
    (function () {
      const c = document.getElementById('particles');
      const ctx = c.getContext('2d');
      let w, h, pts = [];
      function resize() { w = c.width = innerWidth; h = c.height = innerHeight; }
      resize(); addEventListener('resize', resize);
      for (let i = 0; i < 50; i++) pts.push({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - .5) * .3, vy: (Math.random() - .5) * .3,
        r: Math.random() * 2 + .5, o: Math.random() * .25 + .05
      });
      function draw() {
        ctx.clearRect(0, 0, w, h);
        pts.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200,144,10,${p.o})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();
